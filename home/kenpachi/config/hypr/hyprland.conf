monitor=,preferred,auto,1

$terminal = kitty
$fileManager = thunar
$menu = rofi -config $HOME/.config/rofi/config.rasi -show drun -transient-window

source = $HOME/.config/hypr/hyprscripts.conf
source = $HOME/.config/hypr/hyprbinds.conf

env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have thatwall_change.sh
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

general {
    gaps_in = 9
    gaps_out = 12
    border_size = 0

    layout = dwindle
    resize_on_border=true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    rounding = 8
    inactive_opacity = 0.99
    active_opacity = 1
} 

animations {
    enabled = true
    # Animation curves
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, default, slide top
    animation = windowsOut, 1, 5, default, slide bottom
    animation = border, 1, 3, default
    animation = borderangle, 1, 5, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default,slidefade 50%
    animation = fadeShadow, 1, 3, default

    bezier = menu_decel, 0.1, 0.5, 0.3, 1
    # animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, default, slide 
    animation = layersOut, 1, 3, default, slide bottom
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes     
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    #new_is_master = true
}

gesture = 3, horizontal, workspace
misc {
    disable_splash_rendering = true
    disable_hyprland_logo = true
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    font_family =  JetBrainsMono Nerd Font
}

device {
    name = epic-mouse-v1
    sensitivity = 1
}

windowrulev2=float,class:floatterm
windowrulev2=center,class:floatterm
windowrulev2=size 80% 80%,class:floatterm
windowrulev2 = noanim, class:^(hyprpicker)$
windowrulev2 = float,class:^(wayland-boomer - image viewer)$

layerrule = noanim, hyprpicker
#exec-once = mako
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprpaper
exec-once = dunst
