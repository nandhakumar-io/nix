$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, killactive
bind = ALT, T, exec, kitty
bind = $mainMod, M, exit,
bind = $mainMod, B, exec, firefox
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, T, togglefloating, 
bind = $mainMod, A, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, S, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind=ALT,F,fullscreen

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86MonBrightnessUp, exec, $HOME/.config/scripts/dunst/brightness_control.sh high
bind = , XF86MonBrightnessDown, exec, $HOME/.config/scripts/dunst/brightness_control.sh low

bind =, XF86AudioRaiseVolume, exec, $HOME/.config/scripts/dunst/volume_control.sh high
bind =, XF86AudioLowerVolume, exec, $HOME/.config/scripts/dunst/volume_control.sh low
bind =, XF86AudioMute, exec,  $HOME/.config/scripts/dunst/volume_control.sh mute

bind = ALT , B, exec,$HOME/.config/scripts/dunst/battery_control.sh get 

bind = $mainMod SHIFT, L, resizeactive, 50 0
bind = $mainMod SHIFT, H, resizeactive, -50 0
bind = $mainMod SHIFT, K, resizeactive, 0 -50
bind = $mainMod SHIFT, J, resizeactive, 0 50
bind = $mainMod SHIFT, R, exec, rofi -config /home/kenpachi-zaraki/.config/rofi/config2.rasi -show drun -transient-window
bind = $mainMod SHIFT, C, exec, /home/kenpachi-zaraki/.config/scripts/rofi_scripts/change_wall.sh
#below four binds are for screenshots
# region → clipboard
bind = , Print, exec, grimblast --freeze copy area

# region → edit
bind = SHIFT, Print, exec, grimblast --freeze copysave area - | swappy -f -

# active window
bind = $mainMod, Print, exec, grimblast copy active

# full screen
bind = CTRL, Print, exec, grimblast copy screen
#for clipboard(copy and paste)
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wtype - 

bind=$mainMod,T,togglespecialworkspace,workspace
bind=$mainMod SHIFT,T,movetoworkspacesilent,special:workspace
#bind=$mainMod SHIFT,Q,exec,kitty --class floatterm
bind=$mainMod SHIFT,P,exec,hyprpicker -alt
bind=$mainMod SHIFT,Z,exec,woomer

bind = $mainMod, E, exec, kitty --class floatingkitty -e htop
windowrule = float, class:^(floatingkitty)$
windowrule = size 800 500, class:^(floatingkitty)$
windowrule = center, class:^(floatingkitty)$

